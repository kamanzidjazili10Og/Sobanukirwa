        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobanukirwa - Admin Panel</title>
    <link rel="shortcut icon" href="../Images/logo2.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../font-awasome/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="dashboardScreen" class="dashboard-screen">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-mosque"></i>
                <span>Sobanukirwa</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie"></i> <span data-i18n="dashboard">Dashboard</span></a>
                <a href="#" class="nav-item" data-page="artists"><i class="fas fa-users"></i> <span data-i18n="artists">Artists</span></a>
                <a href="#" class="nav-item" data-page="tracks"><i class="fas fa-music"></i> <span data-i18n="tracks">Tracks</span></a>
                <a href="#" class="nav-item" data-page="videos"><i class="fas fa-video"></i> <span data-i18n="videos">Videos</span></a>
                <a href="#" class="nav-item" data-page="adhkar"><i class="fas fa-pray"></i> <span data-i18n="adhkar">Adhkar</span></a>
                <a href="#" class="nav-item" data-page="quran"><i class="fas fa-quran"></i> <span data-i18n="quran">Quran</span></a>
                <a href="#" class="nav-item" data-page="books"><i class="fas fa-book"></i> <span data-i18n="books">Books</span></a>
                <a href="#" class="nav-item" data-page="categories"><i class="fas fa-tags"></i> <span data-i18n="categories">Categories</span></a>
                <a href="#" class="nav-item" data-page="settings"><i class="fas fa-cog"></i> <span data-i18n="settings">Settings</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="back-link"><i class="fas fa-external-link-alt"></i> <span data-i18n="website">View Website</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h2 id="pageTitle">Dashboard</h2>
                <div class="header-actions">
                    <div class="lang-switcher">
                        <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
                        <button class="lang-btn" data-lang="rw" onclick="setLang('rw')">RW</button>
                        <button class="lang-btn" data-lang="ar" onclick="setLang('ar')">AR</button>
                    </div>
                    <button class="header-btn" onclick="refreshCurrentPage()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>
            <div id="toastContainer" class="toast-container"></div>
            <div class="content-body" id="contentBody"></div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
