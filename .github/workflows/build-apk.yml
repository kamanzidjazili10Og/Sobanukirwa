name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: ./SobanukirwaNative/android
        run: gradle assembleDebug

      - name: Find and copy APK
        run: |
          mkdir -p release
          find SobanukirwaNative -name "*.apk" -type f -exec cp {} release/Sobanukirwa-v1.0.0.apk \;
          ls -la release/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sobanukirwa-APK
          path: release/Sobanukirwa-v1.0.0.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Sobanukirwa v1.0.${{ github.run_number }}"
          body: |
            ## Sobanukirwa Islamic App - Android APK

            **Auto-updates:** Changes to Railway show instantly - no reinstall needed!

            ### How to install
            1. Download the APK below
            2. Open it on your phone
            3. Allow "Install from unknown sources"
            4. Install and open
          files: release/Sobanukirwa-v1.0.0.apk
          make_latest: true
