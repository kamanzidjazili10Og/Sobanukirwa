name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: ./SobanukirwaNative/android
        run: gradle assembleRelease

      - name: Rename APK
        run: |
          mkdir -p release
          cp SobanukirwaNative/android/app/build/outputs/apk/release/app-release-unsigned.apk release/Sobanukirwa-v1.0.0.apk 2>/dev/null || cp SobanukirwaNative/android/app/build/outputs/apk/debug/app-debug.apk release/Sobanukirwa-v1.0.0.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sobanukirwa-APK
          path: release/Sobanukirwa-v1.0.0.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Sobanukirwa v1.0.${{ github.run_number }}"
          body: |
            ## Sobanukirwa Islamic App - Android APK

            **Auto-updates:** Changes to Railway show instantly - no reinstall needed!

            ### Features
            - Full-screen native Android experience
            - Offline detection with retry page
            - Green Islamic theme (#1B5E20)
            - Back button navigation
            - Camera, location, storage permissions
          files: release/Sobanukirwa-v1.0.0.apk
          make_latest: true
          generate_release_notes: true
