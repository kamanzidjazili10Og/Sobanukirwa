name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Build APK
        working-directory: ./SobanukirwaNative/android
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          mkdir -p release
          cp SobanukirwaNative/android/app/build/outputs/apk/debug/app-debug.apk release/Sobanukirwa-v1.0.0.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sobanukirwa-APK
          path: release/Sobanukirwa-v1.0.0.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          tag_name: v1.0.0
          name: "Sobanukirwa v1.0.0"
          body: |
            ## Sobanukirwa Islamic App - Android APK

            This is a native Android wrapper that loads the Railway-hosted web app.

            **Auto-updates:** Any changes to the web app on Railway are automatically reflected - no need to reinstall!

            ### Features:
            - Full-screen immersive experience
            - Offline detection with retry page
            - Material Design green theme
            - Back button navigation
            - Camera, location, and storage permissions

            **Install:** Download the APK below, enable "Install from unknown sources" on your phone, and install.
          files: release/Sobanukirwa-v1.0.0.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
