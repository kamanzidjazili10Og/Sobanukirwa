name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install app dependencies
        working-directory: ./SobanukirwaApp
        run: npm install

      - name: Build APK with EAS
        working-directory: ./SobanukirwaApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive

      - name: Get build artifact URL
        id: build-url
        working-directory: ./SobanukirwaApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_ID=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')
          ARTIFACT_URL=$(eas build:view $BUILD_ID --json | jq -r '.artifacts.buildUrl')
          echo "artifact_url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          mkdir -p release
          curl -L "${{ steps.build-url.outputs.artifact_url }}" -o release/Sobanukirwa-v1.1.0.apk
          ls -la release/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sobanukirwa-APK
          path: release/Sobanukirwa-v1.1.0.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.${{ github.run_number }}
          name: "Sobanukirwa v1.1.${{ github.run_number }}"
          body: |
            ## Sobanukirwa Islamic App - Android APK

            ### What's New
            - Adhkar sound playback when tapping the + button

            ### How to install
            1. Download the APK below
            2. Open it on your phone
            3. Allow "Install from unknown sources"
            4. Install and open
          files: release/Sobanukirwa-v1.1.0.apk
          make_latest: true
